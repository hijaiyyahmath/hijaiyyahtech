# ============================================================
# Paket uji #1: U/rho aggregation (string)
# Semua uji ini memaksa:
#  - Cod18(w) = jumlah huruf
#  - U(w) = qt + 4*qd + qs + qz + 2*kz (dari agregat komponen)
#  - rho(w) = ThetaHat(w) - U(w)
#  - ThetaHat(w) = U(w) + rho(w)
# ============================================================
urho_string_tests:
  - name: "بت"
    w: ["ب","ت"]
    expect: {ThetaHat: 4, U: 0, rho: 4}

  - name: "سش / شس (cong)"
    w1: ["س","ش"]
    w2: ["ش","س"]
    expect: {cong: true, ThetaHat: 8, U: 4, rho: 4}

  - name: "صض"
    w: ["ص","ض"]
    expect: {ThetaHat: 12, U: 8, rho: 4}

  - name: "فو"
    w: ["ف","و"]
    expect: {ThetaHat: 10, U: 10, rho: 0}

  - name: "كل"
    w: ["ك","ل"]
    expect: {ThetaHat: 3, U: 2, rho: 1}

# ============================================================
# Paket uji #2: Injective check untuk v18
# ============================================================
injective_v18_test:
  expect_injective: true
  expect_unique_count: 28
