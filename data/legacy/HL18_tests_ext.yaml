  sha256: "6020188a7929ddf6231ac2f61c96ac0007761f8d0512dd7ce2ffd2ec018f12bd"

# Urutan koordinat v18 (wajib)
vector18_layout:
  - ThetaHat
  - nt
  - nf
  - nm
  - km
  - kt
  - kd
  - ka
  - kz
  - qa
  - qt
  - qd
  - qs
  - qz
  - AN
  - AK
  - AQ
  - hamzah_marker

derived_rules:
  U: "qt + 4*qd + qs + qz + 2*kz"
  rho: "ThetaHat - U"
  AN: "nt + nf + nm"
  AK: "km + kt + kd + ka + kz"
  AQ: "qa + qt + qd + qs + qz"
  ThetaDeg: "90 * ThetaHat"

