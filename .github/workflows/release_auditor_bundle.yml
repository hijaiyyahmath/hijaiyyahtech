name: Release Auditor Bundle

on:
  push:
    tags:
      - "stack-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python (locked)
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: "pip"

      - name: Fail-closed Python version check
        run: |
          python -V
          python -c "import sys; assert sys.version_info >= (3,10)"

      - name: Build, Verify and Update Manifest
        id: build
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install -U pip setuptools wheel
          python3 -m pip install pyyaml pytest
          python3 -m pip install -e AuditorBundle/hl18
          python3 -m pip install -e AuditorBundle/hisa-vm
          
          # 1) Verify (Dry-Run)
          python3 AuditorBundle/scripts/verify_all.py
          
          # 2) Build
          BUNDLE_ID=$(python3 -c "import json; print(json.load(open('AuditorBundle/RELEASE_ID.json'))['bundle_id'])")
          echo "bundle_id=$BUNDLE_ID" >> $GITHUB_OUTPUT
          python3 tools/build_auditor_bundle.py --bundle-id "$BUNDLE_ID"
          
          # 3) Update Manifest
          python3 scripts/update_release_manifest.py
          
          # 4) Commit and Push Manifest
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web/apps/hijaiyyahmath-org/public/releases/auditor_bundles.json
          git commit -m "docs: update auditor bundle manifest for $BUNDLE_ID" || echo "No changes to commit"
          git push origin HEAD:master

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
