name: CI AuditorBundle (E2E)

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  bundle-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (locked)
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: "pip"

      - name: Fail-closed Python version check
        run: |
          python -V
          python -c "import sys; assert sys.version_info >= (3,10)"

      - name: Build bundle (MANIFEST + SHA256SUMS + tar.gz)
        run: |
          python -m pip install -U pip
          # if build_auditor_bundle.py is not in root, adjust path accordingly
          python tools/build_auditor_bundle.py --bundle-id "HijaiyyahStack-AuditorBundle-CI"

      - name: Extract tarball and run verify_all (fail-closed)
        run: |
          set -euo pipefail
          TAR="$(ls -1 dist/*.tar.gz | head -n 1)"
          mkdir -p /tmp/aud && cd /tmp/aud
          tar -xzf "$GITHUB_WORKSPACE/$TAR"
          cd AuditorBundle

          python -m venv .venv
          . .venv/bin/activate

          pip install -r requirements.lock.txt
          pip install -e hl18

          python scripts/verify_all.py
