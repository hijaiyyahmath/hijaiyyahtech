# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        # Install sub-packages to resolve dependencies and setup paths
        pip install -e hisa-vm
        pip install -e hijaiyyahlang-hl18
        pip install -e hgss-hc18dc
        pip install -e hijaiyyah-ai-hgss
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        # Set PYTHONPATH to include all source directories for cross-package imports
        export PYTHONPATH=$PYTHONPATH:$(pwd)/hisa-vm/src:$(pwd)/hijaiyyahlang-hl18/src:$(pwd)/hgss-hc18dc/src:$(pwd)/hijaiyyah-ai-hgss/src:$(pwd)/cmm18c/src:$(pwd)
        
        # Run tests in sub-packages to avoid name collisions between 'tests' folders
        pytest hisa-vm/tests
        pytest hijaiyyahlang-hl18/tests
        pytest hgss-hc18dc/tests
        pytest hijaiyyah-ai-hgss/tests || true # Allow optional failures in experimentals
        pytest cmm18c/tests
        pytest tests # Root tests
